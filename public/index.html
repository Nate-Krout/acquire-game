<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Acquire</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        touch-action: manipulation;
      }
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      #root > div {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      /* Mobile toggle behavior: under 1024px, show only one panel at a time */
      .mobile-toggle-btn { display: none; }
      @media (max-width: 1023px) {
        .mobile-toggle-btn { display: block !important; }
        .mobile-panel.mobile-hidden { display: none !important; }
        .mobile-panel.mobile-visible {
          display: flex !important;
          width: 100% !important;
          max-width: 100% !important;
          min-width: 0 !important;
          flex: 1 !important;
          overflow-x: auto !important;
          overflow-y: auto !important;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
