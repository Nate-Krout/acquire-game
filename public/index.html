<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acquire</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow-x: auto;
        overflow-y: auto;
        touch-action: auto;
      }
      /* Desktop: lock the app to exactly one viewport, no page-level scrolling needed.
         Mobile (anything under 1024px) is intentionally left unconstrained so the
         browser's native pinch-zoom and pan/scroll work normally. */
      @media (min-width: 1024px) {
        html, body {
          overflow: hidden;
          height: 100vh;
          width: 100vw;
        }
        #root {
          height: 100vh;
          width: 100vw;
          overflow: hidden;
          display: flex;
          flex-direction: column;
        }
        #root > div {
          flex: 1;
          display: flex;
          flex-direction: column;
          min-height: 0; /* allow inner flex children to actually shrink/scroll instead of overflowing */
          overflow: hidden;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
